<!DOCTYPE html>
<html>
<head>
    <title>Dr. B.R. Ambedkar AI</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            border-left: 4px solid #ffd700;
            padding-left: 15px;
        }
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: #2a5298;
        }
        button {
            background: #2a5298;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }
        button:hover {
            background: #1e3c72;
        }
        #response {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-top: 25px;
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 15px;
        }
        .loading {
            color: #666;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #999;
            text-align: center;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .sample-questions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .sample-btn {
            background: #e8e8e8;
            color: #333;
            padding: 8px 15px;
            font-size: 12px;
            margin-top: 0;
        }
        .sample-btn:hover {
            background: #d0d0d0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dr. B.R. Ambedkar AI</h1>
        <div class="subtitle">Ask questions based on his writings, speeches, and parliamentary debates</div>
        
        <textarea id="question" rows="4" placeholder="Example: What is your view on the caste system?"></textarea>
        
        <div class="sample-questions">
            <button class="sample-btn" onclick="setQuestion('What is your view on the caste system?')">📜 Caste System</button>
            <button class="sample-btn" onclick="setQuestion('Why is education important?')">📚 Education</button>
            <button class="sample-btn" onclick="setQuestion('What is your message to young people?')">💬 Message to Youth</button>
            <button class="sample-btn" onclick="setQuestion('What is social justice?')">⚖️ Social Justice</button>
        </div>
        
        <button onclick="askQuestion()">Ask Dr. Ambedkar</button>
        
        <div id="response"></div>
        <div class="footer">Based on Dr. B.R. Ambedkar's collected writings • Cloud-hosted on AWS</div>
    </div>

    <script>
        const API_URL = 'http://13.207.4.184:8000';
        
        function setQuestion(text) {
            document.getElementById('question').value = text;
            askQuestion();
        }
        
        async function askQuestion() {
            const question = document.getElementById('question').value.trim();
            const responseDiv = document.getElementById('response');
            
            if (!question) {
                responseDiv.innerHTML = '<span style="color: red;">❌ Please enter a question.</span>';
                return;
            }
            
            responseDiv.innerHTML = '<div class="loading">🤔 Dr. Ambedkar is reflecting on your question...</div>';
            
            try {
                const response = await fetch(`${API_URL}/api/v1/chat`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        question: question, 
                        session_id: "web_" + Date.now(),
                        language: "en"
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                responseDiv.innerHTML = data.response;
            } catch (error) {
                responseDiv.innerHTML = `<span style="color: red;">❌ Error: ${error.message}</span>`;
            }
        }
        
        // Allow Ctrl+Enter to submit
        document.getElementById('question').addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                askQuestion();
            }
        });
    </script>
</body>
</html>
