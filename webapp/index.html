<!DOCTYPE html>
<html>
<head>
    <title>Dr. B.R. Ambedkar AI</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .title-image {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }
        .subtitle {
            color: #666;
            margin-bottom: 20px;
            border-left: 4px solid #ffd700;
            padding-left: 15px;
        }
        /* Language Tabs */
        .language-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }
        .lang-tab {
            padding: 8px 20px;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s;
        }
        .lang-tab.active {
            background: #2a5298;
            color: white;
        }
        .lang-tab:hover:not(.active) {
            background: #e8e8e8;
        }
        .question-area {
            display: block;
        }
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #2a5298;
        }
        button {
            background: #2a5298;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background: #1e3c72;
        }
        #response {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-top: 25px;
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 15px;
        }
        .thinking-container {
            text-align: center;
            padding: 20px;
            display: none;
            background: #f5f5f5;
            border-radius: 10px;
            margin-top: 20px;
        }
        .thinking-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            animation: gentlePulse 1.5s ease-in-out infinite;
        }
        @keyframes gentlePulse {
            0% { opacity: 0.6; transform: scale(0.98); box-shadow: 0 0 0 0 rgba(42, 82, 152, 0.4); }
            50% { opacity: 1; transform: scale(1.02); box-shadow: 0 0 0 15px rgba(42, 82, 152, 0); }
            100% { opacity: 0.6; transform: scale(0.98); box-shadow: 0 0 0 0 rgba(42, 82, 152, 0); }
        }
        .thinking-dots {
            font-style: italic;
            color: #666;
            font-size: 16px;
            margin-top: 10px;
        }
        .thinking-subtitle {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #999;
            text-align: center;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .sample-questions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .sample-btn {
            background: #e8e8e8;
            color: #333;
            padding: 8px 15px;
            font-size: 12px;
            margin-top: 0;
            border-radius: 20px;
        }
        .sample-btn:hover {
            background: #d0d0d0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <img src="/static/ambedkar-profile.jpg" alt="Dr. B.R. Ambedkar" class="title-image" onerror="this.style.display='none'">
            Dr. B.R. Ambedkar AI
        </h1>
        <div class="subtitle" id="subtitle">Ask questions based on his writings, speeches, and parliamentary debates</div>
        
        <!-- Language Tabs -->
        <div class="language-tabs">
            <button class="lang-tab active" onclick="setLanguage('en')">🇬🇧 English</button>
            <button class="lang-tab" onclick="setLanguage('hi')">🇮🇳 हिन्दी</button>
        </div>
        
        <div class="question-area">
            <textarea id="question" rows="4" placeholder="Example: What is your view on the caste system?"></textarea>
            
            <div class="sample-questions" id="sampleQuestions">
                <button class="sample-btn" onclick="setQuestion('What is your view on the caste system?')">📜 Caste System</button>
                <button class="sample-btn" onclick="setQuestion('Why is education important?')">📚 Education</button>
                <button class="sample-btn" onclick="setQuestion('What is your message to young people?')">💬 Message to Youth</button>
                <button class="sample-btn" onclick="setQuestion('What is social justice?')">⚖️ Social Justice</button>
            </div>
            
            <button onclick="askQuestion()" id="askBtn">Ask Dr. Ambedkar</button>
        </div>
        
        <div id="thinkingIndicator" class="thinking-container">
            <img src="/static/ambedkar-profile.jpg" alt="Dr. B.R. Ambedkar" class="thinking-image" onerror="this.style.display='none'">
            <div class="thinking-dots" id="thinkingText">Dr. Ambedkar is reflecting on your question<span>.</span><span>.</span><span>.</span></div>
            <div class="thinking-subtitle" id="thinkingSubtitle">Drawing from his writings and speeches...</div>
        </div>
        
        <div id="response"></div>
        <div class="footer">Based on Dr. B.R. Ambedkar's collected writings • Cloud-hosted on AWS</div>
    </div>

    <script>
        const API_URL = "";
        let currentLanguage = 'en';
        
        // Language-specific content
        const translations = {
            en: {
                subtitle: "Ask questions based on his writings, speeches, and parliamentary debates",
                placeholder: "Example: What is your view on the caste system?",
                askButton: "Ask Dr. Ambedkar",
                thinking: "Dr. Ambedkar is reflecting on your question",
                thinkingSub: "Drawing from his writings and speeches...",
                sampleQuestions: [
                    { text: "📜 Caste System", question: "What is your view on the caste system?" },
                    { text: "📚 Education", question: "Why is education important?" },
                    { text: "💬 Message to Youth", question: "What is your message to young people?" },
                    { text: "⚖️ Social Justice", question: "What is social justice?" }
                ]
            },
            hi: {
                subtitle: "डॉ. बाबासाहेब अंबेडकर के लेखन, भाषणों और संसदीय बहसों पर आधारित प्रश्न पूछें",
                placeholder: "उदाहरण: जाति व्यवस्था पर आपके क्या विचार हैं?",
                askButton: "डॉ. अंबेडकर से पूछें",
                thinking: "डॉ. अंबेडकर आपके प्रश्न पर विचार कर रहे हैं",
                thinkingSub: "उनके लेखन और भाषणों से...",
                sampleQuestions: [
                    { text: "📜 जाति व्यवस्था", question: "जाति व्यवस्था पर आपके क्या विचार हैं?" },
                    { text: "📚 शिक्षा", question: "शिक्षा क्यों महत्वपूर्ण है?" },
                    { text: "💬 युवाओं के लिए संदेश", question: "युवाओं के लिए आपका क्या संदेश है?" },
                    { text: "⚖️ सामाजिक न्याय", question: "सामाजिक न्याय क्या है?" }
                ]
            }
        };
        
        function setLanguage(lang) {
            currentLanguage = lang;
            
            // Update active tab styling
            document.querySelectorAll('.lang-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            if (lang === 'en') {
                document.querySelector('.lang-tab:first-child').classList.add('active');
            } else {
                document.querySelector('.lang-tab:last-child').classList.add('active');
            }
            
            // Update UI text
            const t = translations[lang];
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('question').placeholder = t.placeholder;
            document.getElementById('askBtn').textContent = t.askButton;
            
            // Update sample questions
            const sampleContainer = document.getElementById('sampleQuestions');
            sampleContainer.innerHTML = '';
            t.sampleQuestions.forEach(sq => {
                const btn = document.createElement('button');
                btn.className = 'sample-btn';
                btn.textContent = sq.text;
                btn.onclick = () => setQuestion(sq.question);
                sampleContainer.appendChild(btn);
            });
        }
        
        function setQuestion(text) {
            document.getElementById('question').value = text;
            askQuestion();
        }
        
        function showThinking() {
            const t = translations[currentLanguage];
            document.getElementById('thinkingText').innerHTML = t.thinking + '<span>.</span><span>.</span><span>.</span>';
            document.getElementById('thinkingSubtitle').textContent = t.thinkingSub;
            document.getElementById('thinkingIndicator').style.display = 'block';
            document.getElementById('response').innerHTML = '';
        }
        
        function hideThinking() {
            document.getElementById('thinkingIndicator').style.display = 'none';
        }
        
        async function askQuestion() {
            const question = document.getElementById('question').value.trim();
            const responseDiv = document.getElementById('response');
            
            if (!question) {
                responseDiv.innerHTML = '<span style="color: red;">❌ ' + (currentLanguage === 'en' ? 'Please enter a question.' : 'कृपया एक प्रश्न दर्ज करें।') + '</span>';
                return;
            }
            
            showThinking();
            
            try {
                const response = await fetch(`${API_URL}/api/v1/chat`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        question: question, 
                        session_id: "web_" + Date.now(),
                        language: currentLanguage
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                hideThinking();
                responseDiv.innerHTML = data.response;
            } catch (error) {
                hideThinking();
                responseDiv.innerHTML = `<span style="color: red;">❌ Error: ${error.message}</span>`;
            }
        }
        
        // Allow Ctrl+Enter to submit
        document.getElementById('question').addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                askQuestion();
            }
        });
        
        // Initialize with English
        setLanguage('en');
    </script>
</body>
</html>
